<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NonProfit Personnel Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ececea;
    --text: #1a1a1a; --text2: #555; --text3: #999;
    --border: #e0e0de; --border2: #ccc;
    --blue: #1a56db; --blue-bg: #eff6ff; --blue-border: #93c5fd;
    --green: #166534; --green-bg: #f0fdf4; --green-border: #86efac;
    --red: #991b1b; --red-bg: #fef2f2; --red-border: #fca5a5;
    --amber: #92400e;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--sans); font-size: 14px; color: var(--text); background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── Connect screen ── */
  #connect-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .connect-card { max-width: 460px; width: 100%; padding: 2.5rem; border: 0.5px solid var(--border); border-radius: 12px; }
  .connect-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .connect-card p { color: var(--text2); font-size: 13px; line-height: 1.6; margin-bottom: 24px; }
  .connect-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .connect-input { width: 100%; font-size: 13px; padding: 9px 11px; border: 0.5px solid var(--border2); border-radius: 7px; color: var(--text); outline: none; font-family: var(--mono); margin-bottom: 12px; }
  .connect-input:focus { border-color: var(--blue); }
  .connect-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: 500; background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-border); border-radius: 7px; cursor: pointer; }
  .connect-btn:hover { background: #dbeafe; }
  .connect-btn:disabled { opacity: 0.5; cursor: wait; }
  .connect-error { font-size: 12px; color: var(--red); background: var(--red-bg); border: 0.5px solid var(--red-border); border-radius: 6px; padding: 9px 12px; margin-top: 10px; display: none; }
  .connect-note { color: var(--text3); font-size: 11px; margin-top: 14px; text-align: center; }

  /* ── App shell ── */
  #app-shell { display: none; flex-direction: column; height: 100vh; }
  #app-shell.visible { display: flex; }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-brand { font-size: 14px; font-weight: 600; }
  .topbar-meta { font-size: 12px; color: var(--text2); }
  .topbar-api { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .topbar-btn { font-size: 12px; color: var(--text2); background: none; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  .topbar-btn:hover { background: var(--bg2); }

  /* Filter bar */
  .filterbar { display: flex; gap: 10px; align-items: center; padding: 9px 18px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .filterbar input[type="text"], .filterbar select { font-size: 12px; padding: 5px 9px; border: 0.5px solid var(--border2); border-radius: 6px; background: var(--bg); color: var(--text); outline: none; }
  .filterbar input[type="text"]:focus, .filterbar select:focus { border-color: var(--blue); }
  .filterbar input[type="text"] { width: 180px; }
  .filter-divider { width: 0.5px; height: 28px; background: var(--border); flex-shrink: 0; }
  .clear-btn { font-size: 12px; color: var(--red); background: none; border: none; cursor: pointer; padding: 4px 2px; }

  /* Revenue slider */
  .rev-group { display: flex; flex-direction: column; gap: 4px; }
  .rev-group-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .rev-row { display: flex; align-items: center; gap: 7px; }
  .rev-val { font-size: 11px; font-family: var(--mono); color: var(--text); min-width: 44px; }
  .rev-val.r { text-align: right; min-width: 52px; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100px; height: 4px; border-radius: 2px; background: var(--border2); outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--blue); cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--blue); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--blue); cursor: pointer; border: 2px solid #fff; }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Org list */
  .orglist { width: 295px; flex-shrink: 0; border-right: 0.5px solid var(--border); overflow-y: auto; position: relative; }
  .orglist-empty { padding: 20px; font-size: 12px; color: var(--text3); }
  .orglist-loading { padding: 20px; font-size: 12px; color: var(--text3); font-style: italic; }
  .orgitem { padding: 10px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; border-left: 3px solid transparent; }
  .orgitem:hover { background: var(--bg2); }
  .orgitem.active { background: var(--bg2); border-left-color: var(--blue); }
  .orgitem-name { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
  .orgitem-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ntag { background: var(--blue-bg); color: var(--blue); border-radius: 3px; padding: 1px 5px; font-size: 10px; }
  .rev-amt { font-weight: 600; color: var(--text); }

  /* Detail */
  .detail { flex: 1; overflow-y: auto; padding: 22px 24px; }
  .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 13px; }
  .detail-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 13px; font-style: italic; }
  .org-ein { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .org-name { font-size: 21px; font-weight: 600; margin-bottom: 14px; line-height: 1.2; }

  /* Year tabs */
  .yr-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .yr-tab { font-size: 12px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: 4px; cursor: pointer; background: var(--bg2); color: var(--text2); }
  .yr-tab:hover { border-color: var(--blue); color: var(--blue); }
  .yr-tab.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); font-weight: 500; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 22px; }
  .card { background: var(--bg2); border-radius: 8px; padding: 12px 14px; }
  .card-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .card-value { font-size: 19px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.5px; }
  .card-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .sec-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

  /* Personnel table */
  .tbl-outer { border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .tbl-scroll { max-height: 360px; overflow-y: auto; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr th { position: sticky; top: 0; z-index: 2; background: var(--bg2); padding: 7px 9px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text2); border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 7px 9px; border-bottom: 0.5px solid var(--border); white-space: nowrap; font-family: var(--mono); font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg2); }
  .td-name { font-family: var(--sans); font-weight: 500; font-size: 12px; }
  .td-title { font-family: var(--sans); color: var(--text2); font-size: 12px; max-width: 155px; overflow: hidden; text-overflow: ellipsis; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .big { color: var(--amber); font-weight: 600; }

  /* Prompt helper */
  .prompt-section { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 4px; }
  .prompt-header { display: flex; align-items: center; justify-content: space-between; }
  .prompt-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; }
  .prompt-actions { display: flex; gap: 8px; }
  .btn-sec { font-size: 12px; padding: 5px 12px; cursor: pointer; background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: 6px; }
  .btn-sec:hover { background: var(--bg3); }
  .btn-copy { font-size: 12px; padding: 5px 12px; cursor: pointer; background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-border); border-radius: 6px; }
  .prompt-desc { font-size: 12px; color: var(--text2); margin-top: 10px; line-height: 1.5; }
  .prompt-text { font-family: var(--mono); font-size: 11px; line-height: 1.7; color: var(--text); background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px; padding: 12px; margin-top: 10px; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<!-- Connect screen -->
<div id="connect-screen">
  <div class="connect-card">
    <h1>NonProfit Personnel Explorer</h1>
    <p>Enter your API server address to connect to the live database.</p>
    <label class="connect-label">API URL</label>
    <input class="connect-input" id="api-url-input" type="text" value="http://136.113.246.235:5000" spellcheck="false"/>
    <button class="connect-btn" id="connect-btn">Connect</button>
    <div class="connect-error" id="connect-error"></div>
    <p class="connect-note">Data is served from your GCP VM. Nothing is sent to any third-party server.</p>
  </div>
</div>

<!-- App shell -->
<div id="app-shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">NonProfit Explorer</span>
      <span class="topbar-meta" id="meta-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="topbar-api" id="api-url-display"></span>
      <button class="topbar-btn" id="disconnect-btn">Disconnect</button>
    </div>
  </div>

  <div class="filterbar">
    <input type="text" id="filter-search" placeholder="Search org name…"/>
    <select id="filter-state"><option value="">All states</option></select>
    <select id="filter-ntee"><option value="">All NTEE types</option></select>
    <select id="filter-year"><option value="">All years</option></select>
    <div class="filter-divider"></div>
    <div class="rev-group">
      <div class="rev-group-label">Annual revenue</div>
      <div class="rev-row">
        <span class="rev-val" id="rev-min-lbl">$10M</span>
        <input type="range" id="rev-min-sl" min="0" max="40" value="0" step="1"/>
        <span style="font-size:11px;color:var(--text3)">–</span>
        <input type="range" id="rev-max-sl" min="0" max="40" value="40" step="1"/>
        <span class="rev-val r" id="rev-max-lbl">Any</span>
      </div>
    </div>
    <button class="clear-btn" id="clear-btn" style="display:none">× Clear</button>
  </div>

  <div class="main">
    <div class="orglist" id="org-list"></div>
    <div class="detail" id="detail-panel">
      <div class="detail-empty">← Select an organization to explore</div>
    </div>
  </div>
</div>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
const fc = n => { const v=parseFloat(n); if(isNaN(v)||n===null||n==='')return'—'; const a=Math.abs(v); const s=v<0?'-':''; if(a>=1e9)return`${s}$${(a/1e9).toFixed(1)}B`; if(a>=1e6)return`${s}$${(a/1e6).toFixed(1)}M`; if(a>=1e3)return`${s}$${Math.round(a/1e3)}K`; return`${s}$${Math.round(a)}`; };
const fp = n => { const v=parseFloat(n); if(isNaN(v)||n===null||n==='')return'—'; return`${v>0?'+':''}${v.toFixed(1)}%`; };
const fn = n => { const v=parseInt(n); return isNaN(v)||n===null||n===''?'—':v.toLocaleString(); };
const esc = s => (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const NTEE = {E:'Health – General',F:'Mental Health',G:'Disease & Disorders',H:'Medical Research',I:'Crime & Legal',J:'Employment',K:'Food & Nutrition',L:'Housing',M:'Public Safety',P:'Human Services',Q:'International',T:'Philanthropy'};

// ── State ─────────────────────────────────────────────────────────────────────
let API = '';
let revStops = [], revMinIdx = 0, revMaxIdx = 40;
let activeEin = null, activeYear = null, showPrompt = false;
let orgCount = 0;
let filterDebounce = null;
let currentOrgData = null;

// ── Connect ───────────────────────────────────────────────────────────────────
document.getElementById('connect-btn').addEventListener('click', async () => {
  const url = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  const btn = document.getElementById('connect-btn');
  const errEl = document.getElementById('connect-error');
  btn.disabled = true; btn.textContent = 'Connecting…'; errEl.style.display = 'none';
  try {
    const res = await fetch(`${url}/api/meta`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const meta = await res.json();
    API = url;
    document.getElementById('api-url-display').textContent = API;
    initFromMeta(meta);
    document.getElementById('connect-screen').style.display = 'none';
    document.getElementById('app-shell').classList.add('visible');
    loadOrgList();
  } catch(e) {
    errEl.textContent = `Could not connect: ${e.message}. Check the API URL and make sure the server is running.`;
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Connect';
});
document.getElementById('api-url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('connect-btn').click();
});

document.getElementById('disconnect-btn').addEventListener('click', () => {
  API = ''; activeEin = null; activeYear = null; showPrompt = false; currentOrgData = null;
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('connect-screen').style.display = 'flex';
  document.getElementById('connect-error').style.display = 'none';
  ['filter-state','filter-ntee','filter-year'].forEach(id => {
    const el = document.getElementById(id); while(el.options.length > 1) el.remove(1);
  });
  document.getElementById('org-list').innerHTML = '';
  document.getElementById('detail-panel').innerHTML = '<div class="detail-empty">← Select an organization to explore</div>';
});

// ── Init from meta ────────────────────────────────────────────────────────────
function initFromMeta(meta) {
  // Populate dropdowns
  const add = (id, val, txt) => { const o=document.createElement('option'); o.value=val; o.textContent=txt; document.getElementById(id).appendChild(o); };
  (meta.states||[]).forEach(s => add('filter-state', s, s));
  (meta.ntees||[]).forEach(n  => add('filter-ntee', n, `${n} — ${NTEE[n]||n}`));
  (meta.years||[]).forEach(y  => add('filter-year', y, y));

  // Revenue slider stops (log scale)
  const lo = meta.rev_min || 10e6;
  const hi = meta.rev_max || 1e9;
  revStops = [];
  for (let i = 0; i <= 40; i++) {
    const t = i / 40;
    revStops.push(Math.round(Math.exp(Math.log(lo) + t * (Math.log(hi) - Math.log(lo)))));
  }
  revMinIdx = 0; revMaxIdx = 40;
  document.getElementById('rev-min-sl').value = 0;
  document.getElementById('rev-max-sl').value = 40;
  updateRevLabels();

  // Filter listeners
  ['filter-search','filter-state','filter-ntee','filter-year'].forEach(id => {
    document.getElementById(id).addEventListener('input', scheduleOrgLoad);
  });
  document.getElementById('rev-min-sl').addEventListener('input', () => {
    revMinIdx = parseInt(document.getElementById('rev-min-sl').value);
    if (revMinIdx >= revMaxIdx) { revMaxIdx = Math.min(revMinIdx+1,40); document.getElementById('rev-max-sl').value = revMaxIdx; }
    updateRevLabels(); scheduleOrgLoad();
  });
  document.getElementById('rev-max-sl').addEventListener('input', () => {
    revMaxIdx = parseInt(document.getElementById('rev-max-sl').value);
    if (revMaxIdx <= revMinIdx) { revMinIdx = Math.max(revMaxIdx-1,0); document.getElementById('rev-min-sl').value = revMinIdx; }
    updateRevLabels(); scheduleOrgLoad();
  });
  document.getElementById('clear-btn').addEventListener('click', () => {
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-state').value = '';
    document.getElementById('filter-ntee').value = '';
    document.getElementById('filter-year').value = '';
    revMinIdx=0; revMaxIdx=40;
    document.getElementById('rev-min-sl').value=0;
    document.getElementById('rev-max-sl').value=40;
    updateRevLabels(); updateClearBtn(); loadOrgList();
  });
}

function updateRevLabels() {
  document.getElementById('rev-min-lbl').textContent = fc(revStops[revMinIdx]);
  document.getElementById('rev-max-lbl').textContent = revMaxIdx >= 40 ? 'Any' : fc(revStops[revMaxIdx]);
}
function updateClearBtn() {
  const s = document.getElementById('filter-search').value;
  const st = document.getElementById('filter-state').value;
  const nt = document.getElementById('filter-ntee').value;
  const yr = document.getElementById('filter-year').value;
  const sl = revMinIdx > 0 || revMaxIdx < 40;
  document.getElementById('clear-btn').style.display = (s||st||nt||yr||sl) ? 'inline' : 'none';
}

// ── Org list ──────────────────────────────────────────────────────────────────
function scheduleOrgLoad() {
  updateClearBtn();
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(loadOrgList, 400);
}

async function loadOrgList() {
  const list = document.getElementById('org-list');
  list.innerHTML = '<div class="orglist-loading">Loading…</div>';

  const params = new URLSearchParams();
  const search = document.getElementById('filter-search').value.trim();
  const state  = document.getElementById('filter-state').value;
  const ntee   = document.getElementById('filter-ntee').value;
  const year   = document.getElementById('filter-year').value;
  if (search) params.set('search', search);
  if (state)  params.set('state', state);
  if (ntee)   params.set('ntee', ntee);
  if (year)   params.set('year', year);
  params.set('rev_min', revStops[revMinIdx]);
  if (revMaxIdx < 40) params.set('rev_max', revStops[revMaxIdx]);

  try {
    const res = await fetch(`${API}/api/orgs?${params}`);
    const orgs = await res.json();
    orgCount = orgs.length;
    document.getElementById('meta-label').textContent = `${orgCount.toLocaleString()} orgs`;
    if (orgs.length === 0) { list.innerHTML = '<div class="orglist-empty">No results.</div>'; return; }
    list.innerHTML = orgs.map(o => `
      <div class="orgitem${o.ein===activeEin?' active':''}" data-ein="${esc(o.ein)}">
        <div class="orgitem-name">${esc(o.org_name)}</div>
        <div class="orgitem-meta">
          <span>${esc(o.org_city||'')}, ${esc(o.org_state||'')}</span>
          <span class="rev-amt">${fc(o.totrevenue)}</span>
          ${o.ntee_code?`<span class="ntag">${esc(o.ntee_code)}</span>`:''}
        </div>
      </div>`).join('');
    list.querySelectorAll('.orgitem').forEach(el => {
      el.addEventListener('click', () => {
        activeEin = el.dataset.ein; activeYear = null; showPrompt = false;
        list.querySelectorAll('.orgitem').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        loadOrgDetail();
      });
    });
  } catch(e) {
    list.innerHTML = `<div class="orglist-empty" style="color:var(--red)">Error loading orgs.<br/>${e.message}</div>`;
  }
}

// ── Org detail ────────────────────────────────────────────────────────────────
async function loadOrgDetail() {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="detail-loading">Loading…</div>';
  const params = new URLSearchParams();
  if (activeYear) params.set('year', activeYear);
  try {
    const res = await fetch(`${API}/api/org/${encodeURIComponent(activeEin)}?${params}`);
    const data = await res.json();
    currentOrgData = data;
    renderDetail(data);
  } catch(e) {
    panel.innerHTML = `<div class="detail-empty" style="color:var(--red)">Error loading org detail: ${e.message}</div>`;
  }
}

function renderDetail(data) {
  const panel = document.getElementById('detail-panel');
  const { org, filings, active_year, active_filing, personnel } = data;
  const orgYears = filings.map(f => f.tax_prd_yr);
  const nteeLabel = org.ntee_code ? `${org.ntee_code}${NTEE[org.ntee_code[0]]?' — '+NTEE[org.ntee_code[0]]:''}` : '';
  const promptText = buildPrompt(org, filings, personnel, active_year);

  panel.innerHTML = `
    <div class="org-ein">EIN ${esc(org.ein)}${nteeLabel?' · '+esc(nteeLabel):''} · ${esc(org.org_city||'')}, ${esc(org.org_state||'')}</div>
    <div class="org-name">${esc(org.org_name)}</div>
    <div class="yr-tabs">${orgYears.map(y=>`<div class="yr-tab${y===active_year?' active':''}" data-yr="${y}">${y}</div>`).join('')}</div>

    ${active_filing ? `
    <div class="cards">
      <div class="card"><div class="card-label">Total revenue</div><div class="card-value">${fc(active_filing.totrevenue)}</div><div class="card-sub">FY ${active_year}</div></div>
      <div class="card"><div class="card-label">Profit margin</div><div class="card-value">${active_filing.margin_pct!=null?parseFloat(active_filing.margin_pct).toFixed(1)+'%':'—'}</div><div class="card-sub">Surplus / revenue</div></div>
      <div class="card"><div class="card-label">Employees</div><div class="card-value">${fn(active_filing.noemployees)}</div><div class="card-sub">Reported headcount</div></div>
      <div class="card"><div class="card-label">Officer comp</div><div class="card-value">${fc(active_filing.total_officer_comp_filing)}</div><div class="card-sub">All officers combined</div></div>
    </div>` : ''}

    <div class="sec-title">Personnel — FY ${active_year} (${personnel.length} records)</div>
    <div class="tbl-outer"><div class="tbl-scroll">
      <table>
        <thead><tr>
          <th>Name</th><th>Title</th><th>Hrs/wk</th>
          <th style="text-align:right">Base</th><th style="text-align:right">Related</th><th style="text-align:right">Other</th>
          <th style="text-align:right">Total</th><th style="text-align:right">Prior yr</th>
          <th style="text-align:right">Δ $</th><th style="text-align:right">Δ %</th>
          <th style="text-align:center">Off.</th>
        </tr></thead>
        <tbody>${personnel.map(p => {
          const chg = parseFloat(p.comp_change_dollars);
          const pct = parseFloat(p.comp_change_pct);
          const bigChg = !isNaN(pct) && Math.abs(pct) > 20;
          const chgCls = isNaN(chg)||p.comp_change_dollars==null?'':chg>0?'pos':chg<0?'neg':'';
          const pctCls = bigChg?'big':chgCls;
          return `<tr>
            <td class="td-name">${esc(p.person_name)}</td>
            <td class="td-title">${esc(p.title)}</td>
            <td>${p.hours_per_week!=null?p.hours_per_week:'—'}</td>
            <td style="text-align:right">${fc(p.base_comp)}</td>
            <td style="text-align:right">${fc(p.related_comp)}</td>
            <td style="text-align:right">${fc(p.other_comp)}</td>
            <td style="text-align:right;font-weight:600">${fc(p.total_comp)}</td>
            <td style="text-align:right;color:#999">${p.prior_yr_total_comp!=null?fc(p.prior_yr_total_comp):'—'}</td>
            <td style="text-align:right" class="${chgCls}">${p.comp_change_dollars!=null?fc(parseFloat(p.comp_change_dollars)):'—'}</td>
            <td style="text-align:right" class="${pctCls}">${p.comp_change_pct!=null?fp(p.comp_change_pct):'—'}</td>
            <td style="text-align:center">${p.is_officer?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--text3)">·</span>'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div></div>

    <div class="prompt-section">
      <div class="prompt-header">
        <span class="prompt-label">Claude prompt helper</span>
        <div class="prompt-actions">
          <button class="btn-sec" id="toggle-prompt-btn">${showPrompt?'Hide prompt':'Build prompt'}</button>
          ${showPrompt?'<button class="btn-copy" id="copy-prompt-btn">Copy to clipboard</button>':''}
        </div>
      </div>
      ${showPrompt?`
        <p class="prompt-desc">Pre-built with data for <strong>${esc(org.org_name)}</strong>. Copy and paste into a new Claude conversation.</p>
        <div class="prompt-text">${esc(promptText)}</div>
      `:''}
    </div>
  `;

  panel.querySelectorAll('.yr-tab').forEach(el => {
    el.addEventListener('click', () => { activeYear = parseInt(el.dataset.yr); loadOrgDetail(); });
  });
  const toggleBtn = panel.querySelector('#toggle-prompt-btn');
  if (toggleBtn) toggleBtn.addEventListener('click', () => { showPrompt=!showPrompt; renderDetail(currentOrgData); });
  const copyBtn = panel.querySelector('#copy-prompt-btn');
  if (copyBtn) copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(promptText).then(() => {
      copyBtn.textContent='Copied!'; setTimeout(()=>{ copyBtn.textContent='Copy to clipboard'; },2000);
    });
  });
}

// ── Prompt builder ────────────────────────────────────────────────────────────
function buildPrompt(org, filings, personnel, activeYear) {
  const finLines = [...filings].reverse().map(f =>
    `${f.tax_prd_yr}: Revenue ${fc(f.totrevenue)}, Surplus ${fc(f.surplus)}, Margin ${f.margin_pct!=null?parseFloat(f.margin_pct).toFixed(1)+'%':'N/A'}, Employees ${f.noemployees||'N/A'}`
  ).join('\n');
  const persLines = personnel.filter(p=>parseFloat(p.total_comp)>0).slice(0,20).map(p =>
    `${activeYear} | ${p.person_name} | ${p.title} | Total: ${fc(p.total_comp)}${p.comp_change_pct!=null?' | YoY: '+fp(p.comp_change_pct):''}`
  ).join('\n');
  return `You are a healthcare nonprofit financial analyst. Analyze the following data for ${org.org_name} (EIN: ${org.ein}, NTEE: ${org.ntee_code}, ${org.org_city}, ${org.org_state}).

FINANCIAL TRENDS:
${finLines}

KEY PERSONNEL & COMPENSATION (FY ${activeYear}):
${persLines}

Please provide:
1. A brief financial health assessment (2–3 sentences)
2. Notable executive compensation patterns or trends
3. Any flags or unusual patterns worth investigating
4. A one-sentence strategic outlook

Be concise and analytical. Focus on patterns that would matter to a consultant or potential partner.`;
}
</script>
</body>
</html>
